name: Generate Report + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  web-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Selenium Web Test Dependencies
      run: |
        cd frontend/selenium-tests
        npm install

    - name: Run Selenium Web Tests
      run: |
        cd frontend/selenium-tests
        npm test
      continue-on-error: true

    - name: Save Web Results
      uses: actions/upload-artifact@v4
      with:
        name: web-report
        path: reports/CivicBin_Web_Selenium_Report.xlsx

  mobile-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Appium Mobile Test Dependencies
      run: |
        cd frontend/appium-tests
        npm install

    - name: Run Appium Mobile Tests
      run: |
        cd frontend/appium-tests
        npm test

    - name: Save Mobile Results
      uses: actions/upload-artifact@v4
      with:
        name: mobile-report
        path: reports/CivicBin_Mobile_Appium_Report.xlsx

  deploy:
    name: Deploy to GitHub Pages
    needs: web-tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy static files to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./web

  generate-report:
    name: Generate CivicBin Test Report
    needs: [web-tests, mobile-tests]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Web Results
      uses: actions/download-artifact@v4
      with:
        name: web-report
        path: reports

    - name: Download Mobile Results
      uses: actions/download-artifact@v4
      with:
        name: mobile-report
        path: reports

    - name: Verify Generated Reports
      run: |
        ls -la reports/

    - name: Upload Final Unified Reports
      uses: actions/upload-artifact@v4
      with:
        name: CivicBin_Test_Reports
        path: reports/
